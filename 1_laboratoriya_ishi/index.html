<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urganch Shahar Sayti</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f0f0f0;
}

/* Header */
.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#4CAF50;
    color:white;
    padding:20px 50px;
    position:relative;
}

.site-title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    font-weight:bold;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:2px solid white;
}

.profile-info{
    display:flex;
    flex-direction:column;
}

/* Menu */
.main-menu{
    display:flex;
    justify-content:center;
    gap:40px;
    background:#2E7D32;
    padding:15px;
}

.main-menu a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.main-menu a:hover{
    color:#FFD700;
}

/* Laboratories */
.laboratories{
    display:none;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.laboratory{
    background:white;
    padding:20px;
    width:200px;
    text-align:center;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
}

.laboratory:hover{
    transform:scale(1.05);
}

/* Modal */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    width:400px;
    max-height:80%;
    overflow:auto;
    border-radius:10px;
    position:relative;
}

.close{
    position:absolute;
    right:15px;
    top:10px;
    font-size:22px;
    cursor:pointer;
}

/* Form style */
form input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

form button{
    background:#2E7D32;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

form button:hover{
    background:#1B5E20;
}
</style>
</head>
<body>

<!-- Header -->
<div class="top-header">
    <div></div>
    <div class="site-title">Urganch shahar saytiga xush kelibsiz!</div>
    <div class="profile">
        <img src="photo_2026-02-24_13-32-19.jpg" alt="Rasm">
        <div class="profile-info">
            <strong>Ibodullayeva Dilafruz</strong>
            <small>Web texnologiya / Student</small>
        </div>
    </div>
</div>

<!-- Menu -->
<nav class="main-menu">
    <a href="#">Bosh menyu</a>
    <a href="#" id="labsBtn">Laboratoriyalar</a>
    <a href="#">Rasmlar</a>
</nav>

<!-- Laboratory List -->
<div class="laboratories" id="labsList">
    <div class="laboratory" data-id="1">1-Laboratoriya</div>
    <div class="laboratory" data-id="2">2-Laboratoriya</div>
    <div class="laboratory" data-id="3">3-Laboratoriya</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" id="close">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const labsBtn = document.getElementById("labsBtn");
const labsList = document.getElementById("labsList");
const labs = document.querySelectorAll(".laboratory");
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("close");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");

/* Laboratory toggle */
labsBtn.addEventListener("click", function(e){
    e.preventDefault();
    labsList.style.display = labsList.style.display === "flex" ? "none" : "flex";
});

/* Tasks data */
const tasks = {
    2: [
        "1-Topshiriq: JS eventlar bilan ishlash",
        "2-Topshiriq: DOM manipulyatsiya qilish"
    ],
    3: [
        "1-Topshiriq: Formani tekshirish",
        "2-Topshiriq: Ajax bilan ma'lumot yuborish"
    ]
};

/* Laboratory click */
labs.forEach(lab => {
    lab.addEventListener("click", function(){
        const id = this.getAttribute("data-id");
        modalTitle.textContent = this.textContent;

        if(id === "1"){
            modalBody.innerHTML = `
                <h3>Kursga yozilish formasi</h3>
                <form id="kursForm">
                    <label>Kurs nomi:</label>
                    <input type="text" name="kurs_nomi" required>

                    <label>Kurs turi:</label>
                    <input type="text" name="kurs_turi" required>

                    <label>Boshlanish sanasi:</label>
                    <input type="date" name="kurs_boshlanish" required>

                    <label>Davomiyligi (oy):</label>
                    <input type="number" name="kurs_davomiylik" required>

                    <label>Narxi:</label>
                    <input type="number" name="kurs_narxi" step="0.01" required>

                    <button type="submit">Yuborish</button>
                </form>
                <div id="result"></div>
            `;

            document.getElementById("kursForm").addEventListener("submit", function(e){
                e.preventDefault();
                const formData = new FormData(this);

                fetch("process.php", {
                    method:"POST",
                    body:formData
                })
                .then(res => res.text())
                .then(data => {
                    document.getElementById("result").innerHTML = data;
                })
                .catch(err => console.log(err));
            });

        } else if(tasks[id]){
            modalBody.innerHTML = "<ul>" +
                tasks[id].map(t => "<li>"+t+"</li>").join("") +
                "</ul>";
        }

        modal.style.display = "flex";
    });
});

/* Close modal */
closeBtn.addEventListener("click", () => modal.style.display = "none");
window.addEventListener("click", e => {
    if(e.target === modal){
        modal.style.display = "none";
    }
});
</script>

</body>
</html>
